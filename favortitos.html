<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - ReTile</title>
    <style>
        /* Título Principal */
        .titulo-wishlist {
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #3d2520; /* Tom castanho escuro idêntico à imagem */
            margin-bottom: 5px;
        }
        .subtitulo-wishlist {
            font-family: sans-serif;
            font-size: 14px;
            color: #333;
            margin-bottom: 20px;
        }
        /* Linha divisória fina */
        .linha-divisoria {
            border: 0;
            border-top: 1px solid #3d2520;
            margin-bottom: 30px;
            opacity: 0.3;
        }
        /* Grelha de Produtos */
        .grelha-favoritos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }
        /* Cartão do Produto */
        .cartao-favorito {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        /* Contentor da Imagem (com fundo cinza claro e coração absoluto) */
        .imagem-contentor {
            position: relative;
            background-color: #f5f5f5; /* Fundo cinza claro igual ao da t-shirt */
            aspect-ratio: 3/4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .imagem-contentor img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        /* Ícone do Coração no canto superior direito */
        .remover-coracao {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            color: #3d2520;
            padding: 0;
        }
        /* Textos do Produto */
        .nome-produto {
            font-family: sans-serif;
            font-size: 15px;
            font-weight: bold;
            color: #111;
            margin: 0 0 6px 0;
        }
        .preco-produto {
            font-family: sans-serif;
            font-size: 13px;
            color: #444;
            margin: 0 0 4px 0;
        }
        .detalhe-produto {
            font-family: sans-serif;
            font-size: 13px;
            color: #888;
            margin: 0 0 15px 0;
        }
        /* Botão Add To Cart Castanho Escuro */
        .btn-add-cart {
            background-color: #3d2520; /* Cor castanha escura da Nude Project */
            color: white;
            border: none;
            padding: 12px;
            font-family: sans-serif;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn-add-cart:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body style="margin: 0; padding: 0;">

    <!-- ⚠️ Podes colar o teu Header/Cabeçalho aqui se quiseres ⚠️ -->

    <main style="padding: 40px 10%;">
        <div class="titulo-wishlist">Wishlist</div>
        <div id="contador-wishlist" class="subtitulo-wishlist">My Wishlist (0)</div>
        
        <hr class="linha-divisoria">

        <!-- Grelha onde os azulejos favoritos vão aparecer -->
        <div id="lista-favoritos" class="grelha-favoritos"></div>
    </main>

    <!-- ⚠️ Podes colar o teu Footer/Rodapé aqui se quiseres ⚠️ -->

    <script>
        function carregarFavoritos() {
            const lista = document.getElementById('lista-favoritos');
            const contador = document.getElementById('contador-wishlist');
            let favoritos = JSON.parse(localStorage.getItem('meusFavoritos')) || [];

            // Atualiza o número de itens no subtítulo (ex: My Wishlist (2))
            contador.innerText = `My Wishlist (${favoritos.length})`;

            if (favoritos.length === 0) {
                lista.innerHTML = '<p style="grid-column: 1 / -1; font-family: sans-serif; color: #666;">A tua wishlist está vazia.</p>';
                return;
            }

            lista.innerHTML = ''; // Limpa antes de renderizar

            favoritos.forEach(function(item, index) {
                lista.innerHTML += `
                    <div class="cartao-favorito">
                        <div class="imagem-contentor">
                            <img src="${item.imagem}" alt="${item.nome}">
                            <!-- Coração preto/castanho para remover -->
                            <button class="remover-coracao" onclick="removerFavorito(${index})" title="Remover dos favoritos">
                                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                </svg>
                            </button>
                        </div>
                        <h3 class="nome-produto">${item.nome}</h3>
                        <p class="preco-produto">${item.preco}</p>
                        <p class="detalhe-produto">Azulejo de Parede</p> <!-- Um detalhe simples abaixo do preço -->
                        <button class="btn-add-cart" onclick="adicionarAoCarrinho('${item.nome}', '${item.imagem}', '${item.preco}')">Add To Cart</button>                    </div>
                `;
            });
        }

        function removerFavorito(index) {
            let favoritos = JSON.parse(localStorage.getItem('meusFavoritos')) || [];
            favoritos.splice(index, 1);
            localStorage.setItem('meusFavoritos', JSON.stringify(favoritos));
            carregarFavoritos(); // Recarrega o design sem fazer refresh à página
        }

        window.onload = carregarFavoritos;
    </script>
</body>
</html>
